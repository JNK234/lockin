<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 300px;
            padding: 15px;
            font-family: sans-serif;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            cursor: pointer;
            margin-bottom: 5px;
        }

        #status {
            margin-top: 10px;
            font-size: 12px;
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h3>Set Active Task</h3>
    <input type="text" id="taskInput" placeholder="e.g., Debugging Qwen2 Model...">
    <button id="startBtn">Start Tracking Context</button>
    <button id="stopBtn">Stop Tracking</button>
    <div id="status">Status: Idle</div>

    <script src="popup.js"></script>
</body>

</html>
