<!-- ABOUTME: LockIn extension settings/options page. -->
<!-- ABOUTME: Configures API base URL and nudge check interval. -->
<!DOCTYPE html>
<html>
<head>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F5F5F7;
            color: #1A1A2E;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .settings-container {
            width: 100%;
            max-width: 480px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }
        .brand-icon {
            width: 32px;
            height: 32px;
            background: #2DD4A8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 700;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
        }

        .card {
            background: #FFFFFF;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #E5E7EB;
            margin-bottom: 16px;
        }

        .section-header {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6B7280;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid #E5E7EB;
        }

        .field {
            margin-bottom: 20px;
        }
        .field:last-child { margin-bottom: 0; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #1A1A2E;
        }
        .field-hint {
            font-size: 11px;
            color: #9CA3AF;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            color: #1A1A2E;
            outline: none;
        }
        input:focus { border-color: #2DD4A8; }

        .btn-primary {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #2DD4A8;
            color: #FFFFFF;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .btn-primary:hover { opacity: 0.9; }

        .toast {
            display: none;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            background: #D1FAE5;
            color: #065F46;
            font-size: 13px;
            font-weight: 500;
            margin-top: 12px;
        }
        .toast.show { display: block; }

        .error-text {
            color: #EF4444;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="settings-container">
        <div class="header">
            <div class="brand-icon">L</div>
            <h1>LockIn Settings</h1>
        </div>

        <div class="card">
            <div class="section-header">Connection</div>
            <div class="field">
                <label for="apiBase">API Base URL</label>
                <div class="field-hint">Backend server address (e.g. http://localhost:8000)</div>
                <input type="text" id="apiBase" placeholder="http://localhost:8000">
                <div class="error-text" id="urlError">URL must start with http:// or https://</div>
            </div>
        </div>

        <div class="card">
            <div class="section-header">Nudge Behavior</div>
            <div class="field">
                <label for="nudgeInterval">Check Interval (minutes)</label>
                <div class="field-hint">How often to check if you're distracted (1–30 minutes)</div>
                <input type="number" id="nudgeInterval" min="1" max="30" value="1">
            </div>
        </div>

        <button class="btn-primary" id="saveBtn">Save Settings</button>
        <div class="toast" id="toast">Settings saved</div>
    </div>

    <script src="config.js"></script>
    <script src="options.js"></script>
</body>
</html>
